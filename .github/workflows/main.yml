name: Build Windows single EXE

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows-static:
    name: Windows x64 static Qt
    runs-on: windows-2022
    timeout-minutes: 120

    defaults:
      run:
        shell: msys2 {0}

    # FindPkgConfig 使用 --static 返回完整的静态传递依赖。
    # Qt 静态库位于 /ucrt64/qt6-static。
    env:
      PKG_CONFIG_ARGN: --static
      PKG_CONFIG_PATH: /ucrt64/lib/pkgconfig:/ucrt64/share/pkgconfig
      CMAKE_PREFIX_PATH: /ucrt64/qt6-static
      LDFLAGS: -static -static-libgcc -static-libstdc++

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install MSYS2 and static dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-qt6-static
            mingw-w64-ucrt-x86_64-brotli
            mingw-w64-ucrt-x86_64-bzip2
            mingw-w64-ucrt-x86_64-dbus
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-gettext-runtime
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-graphite2
            mingw-w64-ucrt-x86_64-harfbuzz
            mingw-w64-ucrt-x86_64-libffi
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libtiff
            mingw-w64-ucrt-x86_64-libwebp
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-pcre2
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-zstd

      - name: Verify static libraries
        run: |
          set -euo pipefail

          echo "CMake:"
          cmake --version

          echo "Compiler:"
          c++ --version

          echo "Qt static installation:"
          test -f /ucrt64/qt6-static/lib/libQt6Core.a
          test -f /ucrt64/qt6-static/lib/libQt6Gui.a
          test -f /ucrt64/qt6-static/lib/libQt6Widgets.a
          test -f /ucrt64/qt6-static/lib/libQt6OpenGL.a
          test -f /ucrt64/qt6-static/lib/libQt6OpenGLWidgets.a

          echo "Important third-party static libraries:"
          test -f /ucrt64/lib/libpng.a
          test -f /ucrt64/lib/libz.a
          test -f /ucrt64/lib/libfreetype.a
          test -f /ucrt64/lib/libharfbuzz.a
          test -f /ucrt64/lib/libpcre2-16.a
          test -f /ucrt64/lib/libjpeg.a
          test -f /ucrt64/lib/libssl.a
          test -f /ucrt64/lib/libcrypto.a

          echo "libpng static flags:"
          pkg-config --static --libs libpng

          echo "FreeType static flags:"
          pkg-config --static --libs freetype2

          echo "HarfBuzz static flags:"
          pkg-config --static --libs harfbuzz

          echo "All required static library checks passed."

      - name: Configure static Release build
        run: |
          set -euo pipefail

          # 每次都清理，避免旧 CMakeCache.txt 保留动态库路径。
          rm -rf build-static

          cmake -S . -B build-static -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/ucrt64/qt6-static \
            -DCMAKE_FIND_LIBRARY_SUFFIXES_OVERRIDE=.a \
            -DBUILD_SHARED_LIBS=OFF \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DZLIB_USE_STATIC_LIBS=ON \
            -DCMAKE_C_FLAGS_RELEASE="-O2 -DNDEBUG -ffunction-sections -fdata-sections" \
            -DCMAKE_CXX_FLAGS_RELEASE="-O2 -DNDEBUG -ffunction-sections -fdata-sections" \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ -Wl,--gc-sections" \
            -DMCD_STATIC_WINDOWS=ON

      - name: Build static executable
        run: |
          set -euo pipefail

          # --verbose 可以在链接失败时显示完整链接命令。
          # 限制并行数，避免静态 Qt 链接时占用过多内存。
          cmake --build build-static \
            --config Release \
            --parallel 2 \
            --verbose

      - name: Create single EXE distribution
        run: |
          set -euo pipefail

          mkdir -p dist

          EXE_PATH="$(find build-static \
            -type f \
            -name 'MachineColorDesigner.exe' \
            -print \
            -quit)"

          if [[ -z "${EXE_PATH}" ]]; then
            echo "MachineColorDesigner.exe was not found." >&2
            find build-static -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Executable found at: ${EXE_PATH}"

          cp "${EXE_PATH}" dist/MachineColorDesigner.exe

          # 删除符号表，减小发布体积。
          strip --strip-unneeded dist/MachineColorDesigner.exe

          echo "EXE information:"
          ls -lh dist/MachineColorDesigner.exe

          echo "SHA-256:"
          sha256sum dist/MachineColorDesigner.exe \
            | tee dist/MachineColorDesigner.exe.sha256

      - name: Verify imported DLLs
        run: |
          set -euo pipefail

          objdump -p dist/MachineColorDesigner.exe \
            | sed -n \
              's/^[[:space:]]*DLL Name:[[:space:]]*//p' \
            | sort -u \
            | tee imported-dlls.txt

          echo
          echo "Imported DLLs:"
          cat imported-dlls.txt

          # 检查 Qt、MinGW 运行库和常见第三方动态库。
          BAD_DLL_PATTERN='^(Qt6.*|libgcc_s_.*|libstdc\+\+-6|libwinpthread-1|libpng.*|zlib1|libpcre2.*|libfreetype.*|libharfbuzz.*|libbrotli.*|libbz2.*|libintl.*|libglib.*|libgraphite2.*|libjpeg.*|libtiff.*|libwebp.*|libssl.*|libcrypto.*)\.dll$'

          if grep -Eiq "${BAD_DLL_PATTERN}" imported-dlls.txt; then
            echo
            echo "ERROR: Non-system runtime DLL dependency found:" >&2

            grep -Ei "${BAD_DLL_PATTERN}" imported-dlls.txt >&2 || true

            exit 1
          fi

          echo
          echo "Static dependency verification passed."

      - name: Upload single EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MachineColorDesigner-Windows-x64-single-exe
          path: |
            dist/MachineColorDesigner.exe
            dist/MachineColorDesigner.exe.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"

          gh release view $tag *> $null

          if ($LASTEXITCODE -ne 0) {
            gh release create `
              $tag `
              --title $tag `
              --generate-notes
          }

          gh release upload `
            $tag `
            "dist/MachineColorDesigner.exe" `
            "dist/MachineColorDesigner.exe.sha256" `
            --clobber
