name: Build Windows single EXE

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows-static:
    name: Windows x64 static Qt
    runs-on: windows-2022
    timeout-minutes: 90

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Install MSYS2, MinGW-w64 and static Qt
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-static

      - name: Display tool versions
        run: |
          set -euo pipefail

          cmake --version
          ninja --version
          g++ --version

          pacman -Q \
            mingw-w64-ucrt-x86_64-qt6-static \
            mingw-w64-ucrt-x86_64-gcc \
            mingw-w64-ucrt-x86_64-cmake

      - name: Configure static Release build
        run: |
          set -euo pipefail

          cmake -S . -B build-static -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/ucrt64/qt6-static \
            -DCMAKE_FIND_LIBRARY_SUFFIXES_OVERRIDE=.a \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++" \
            -DPKG_CONFIG_ARGN=--static \
            -DMCD_STATIC_WINDOWS=ON

      - name: Build
        run: |
          set -euo pipefail
          cmake --build build-static --parallel 2

      - name: Create distribution files
        run: |
          set -euo pipefail

          mkdir -p dist

          EXE_PATH="$(
            find build-static \
              -type f \
              -name 'MachineColorDesigner.exe' \
              -not -path '*/CMakeFiles/*' \
              -print \
              -quit
          )"

          if [[ -z "${EXE_PATH}" ]]; then
            echo "MachineColorDesigner.exe was not found." >&2
            echo "Files generated under build-static:" >&2
            find build-static -maxdepth 4 -type f | sort >&2
            exit 1
          fi

          echo "Executable found at: ${EXE_PATH}"

          cp "${EXE_PATH}" dist/MachineColorDesigner.exe

          strip --strip-unneeded dist/MachineColorDesigner.exe

          (
            cd dist
            sha256sum MachineColorDesigner.exe \
              > MachineColorDesigner.exe.sha256
          )

          cat dist/MachineColorDesigner.exe.sha256
          ls -lh dist/

      - name: Verify executable architecture
        run: |
          set -euo pipefail

          objdump -f dist/MachineColorDesigner.exe

          if ! objdump -f dist/MachineColorDesigner.exe \
              | grep -Eiq 'pei-x86-64|i386:x86-64'; then
            echo "The executable is not a Windows x86-64 binary." >&2
            exit 1
          fi

      - name: Verify DLL dependencies
        run: |
          set -euo pipefail

          mapfile -t IMPORTED_DLLS < <(
            objdump -p dist/MachineColorDesigner.exe \
              | sed -n \
                's/^[[:space:]]*DLL Name:[[:space:]]*//p' \
              | tr -d '\r'
          )

          printf '%s\n' "${IMPORTED_DLLS[@]}" \
            | tee imported-dlls.txt

          BAD_DEPENDENCY=0

          for DLL in "${IMPORTED_DLLS[@]}"; do
            DLL_LOWER="$(
              printf '%s' "${DLL}" \
                | tr '[:upper:]' '[:lower:]'
            )"

            # These indicate that the executable is not truly self-contained.
            case "${DLL_LOWER}" in
              qt*.dll|\
              lib*.dll|\
              zlib*.dll|\
              vulkan-1.dll|\
              vcruntime*.dll|\
              msvcp*.dll|\
              ucrtbase.dll|\
              msvcrt.dll)
                echo "Non-static runtime dependency: ${DLL}" >&2
                BAD_DEPENDENCY=1
                continue
                ;;
            esac

            # Windows API-set DLLs are virtual/system contracts.
            case "${DLL_LOWER}" in
              api-ms-win-*.dll|ext-ms-win-*.dll)
                continue
                ;;
            esac

            # All remaining direct dependencies must be Windows system DLLs.
            if [[ ! -f "/c/Windows/System32/${DLL}" ]]; then
              echo "Non-system DLL dependency: ${DLL}" >&2
              BAD_DEPENDENCY=1
            fi
          done

          if [[ "${BAD_DEPENDENCY}" -ne 0 ]]; then
            echo "The executable is not fully self-contained." >&2
            exit 1
          fi

          echo "Direct imports contain only Windows system DLLs."

      - name: Upload single EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: MachineColorDesigner-Windows-x64-single-exe
          path: |
            dist/MachineColorDesigner.exe
            dist/MachineColorDesigner.exe.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows-static

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: MachineColorDesigner-Windows-x64-single-exe
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            dist/MachineColorDesigner.exe \
            dist/MachineColorDesigner.exe.sha256 \
            --clobber
